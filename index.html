<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<img src="images/girlfriend.jpg" class="photo">
<h1>Hey Beautiful ❤️</h1>
<p class="message">Every day with you feels like a blessing. You make my world brighter, my heart happier, and my life more meaningful.<br><br>There is something I want to ask you...</p>
<button id="showBtn">Click Here ❤️</button>
<div id="question" class="hidden">
<h2>Will You Be Mine Forever? 💍❤️</h2>
<button id="yes">YES ❤️</button><button id="no">NO 😜</button>
</div>
<div id="result" class="hidden"><h1>I Love You So Much ❤️🥹</h1><p>Thank you for making my life beautiful. ❤️ Forever Yours ❤️</p></div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body></html>
